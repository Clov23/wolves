<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBOS DE MONTAÑA - Contacto</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: white; 
        }

        .sitio-footer {
            background-color: #111111;
            color: #FFFFFF;
            padding: 80px 60px;
            display: flex;
            justify-content: space-between; 
            align-items: flex-start; 
            border-top: 3px solid #333333; 
            gap: 40px;
            margin-top: auto;
        }

        .footer-col {
            flex: 1;
        }

        .titulo-seccion {
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            color: #888888;
            display: block; 
        }

        .footer-autores ul {
            list-style: none; 
            padding: 0;
            margin: 0;
        }

        .footer-autores li {
            font-size: 0.9em;
            margin-bottom: 8px; 
            color: #CCCCCC;
        }

        .footer-central {
            flex: 1.5; 
            text-align: center;
        }

        .nombre-proyecto {
            font-size: 2.5em;
            margin: 0 0 15px 0; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 3px; 
        }

        .contacto-label {
            margin: 0 0 5px 0;
            color: #888888; 
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        .contacto-email {
            font-size: 1.1em;
            color: #FFFFFF;
        }

        .footer-formulario {
            max-width: 350px;
        }

        .form-contacto {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-contacto input, .form-contacto textarea {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 0.9em;
            border-radius: 2px;
            outline: none;
        }

        .form-contacto input:focus, .form-contacto textarea:focus {
            border-color: #777;
        }

        .form-contacto button {
            background-color: #FFFFFF;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .form-contacto button:hover {
            background-color: #bbbbbb;
        }

        @media (max-width: 900px) {
            .sitio-footer {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 40px 20px;
            }
            .footer-formulario {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <footer class="sitio-footer">
        
        <div class="footer-col footer-autores">
            <span class="titulo-seccion">Equipo de Desarrollo</span>
            <ul>
                <li>Alejandro Gonzalez</li>
                <li>Erick García</li>
                <li>Daniel Aguilar</li>
                <li>Alejandro Ruiz</li>
                <li>Angel Arturo</li>
                <li>Francisco Ortiz</li>
                <li>Chris Hernandez</li>
                <li>Edwin Sanchez</li>
                <li>Diego</li>
            </ul>
        </div>

        <div class="footer-col footer-central">
            <h2 class="nombre-proyecto">LOBOS DE MONTAÑA</h2>
            <div class="contacto-bloque">
                <p class="contacto-label">Soporte y Contacto</p>
                <p class="contacto-email">wolves@tienda.com</p>
            </div>
        </div>

        <div class="footer-col footer-formulario">
            <span class="titulo-seccion">Contacto Directo</span>
            <form class="form-contacto">
                <input type="text" placeholder="Nombre completo" required>
                <input type="email" placeholder="Correo electrónico" required>
                <input type="tel" placeholder="Teléfono">
                <textarea placeholder="Mensaje..." rows="3" required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>

    </footer>

</body>
</html>
