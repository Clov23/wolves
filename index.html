<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-fluid">
      <header>
        <div class="container text-center">
          <div class="row">
            <div class="col-md-2">info derecha</div>
            <div class="col-md-8">links</div>
            <div class="col-md-2">
                <!-- Aqui se empieza la configuracion del botón para la tienda esto va en el headen cuado lo pasen al main-->
              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button
                  type="button"
                  class="btn btn-primary"
                  data-bs-toggle="modal"
                  data-bs-target="#formModal"
                >
                  <img
                    src="https://cdn-icons-png.flaticon.com/512/8146/8146003.png"
                    alt="Tienda"
                    width="30"
                    height="24"
                  />
                </button>
              </div>
              <!--Aqui termina la configuracion del boton dentro del headen, colocar despues el codigo del formModal-->
            </div>
          </div>
        </div>
        <!--Aqui comienza el codigo del fromModal, necesario para que funcione el boton tienda-->

        <div
          class="modal fade"
          id="formModal"
          tabindex="-1"
          aria-labelledby="formModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="formModalLabel">
                  <p class="text-center">¡Tienda de lobos!</p>
                </h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Cerrar"
                ></button>
              </div>
              <div class="modal-body">
                <!-- Aquí va tu formulario -->
                <p class="text-center">TIENDA</p>
                <form class="row g-3">
                  <div class="col-md-4">
                    <label for="inputEmail4" class="form-label"
                      >Nombre completo</label
                    >
                    <input type="email" class="form-control" id="inputEmail4" />
                  </div>
                  <div class="col-md-4">
                    <label for="inputPassword4" class="form-label"
                      >N. de tarjeta de debito/credito</label
                    >
                    <input
                      type="password"
                      class="form-control"
                      id="inputPassword4"
                    />
                  </div>
                  <div class="col-12">
                    <label for="inputAddress" class="form-label">Address</label>
                    <input
                      type="text"
                      class="form-control"
                      id="inputAddress"
                      placeholder="1234 Main St"
                    />
                  </div>
                  <div class="col-12">
                    <label for="inputAddress2" class="form-label"
                      >Address 2</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="inputAddress2"
                      placeholder="Apartment, studio, or floor"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="inputCity" class="form-label">City</label>
                    <input type="text" class="form-control" id="inputCity" />
                  </div>
                  <div class="col-md-4">
                    <label for="inputState" class="form-label">State</label>
                    <select id="inputState" class="form-select">
                      <option selected>Choose...</option>
                      <option>Iztapalapa</option>
                      <option>Neza</option>
                      <option>lLos pinos</option>
                      <option>Jacinto</option>
                      <option>Texcoco</option>
                    </select>
                  </div>
                  <div class="col-md-2">
                    <label for="inputZip" class="form-label">Zip</label>
                    <input type="text" class="form-control" id="inputZip" />
                  </div>
                  <div class="col-12">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="gridCheck"
                      />
                      <label class="form-check-label" for="gridCheck">
                        Aceptar terminos y condiciones.
                      </label>
                    </div>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                      ¡Comprar!
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </header>
    </div>

    
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 d-flex">
      <div class="card w-100">
        <img
          src="images/products/sleeping-bags/u-2.5.jpg"
          class="card-img-top img-uniforme"
          alt="sleeping-bag-u-2.5"
        />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Sleeping Bag Ligero (U = 2.5 W/m²K)</h5>
          <p class="card-text">
            Perfecto para climas cálidos. Ligero, compacto y fácil de
            transportar, ideal para verano o camping casual.
          </p>

          <ul class="list-group list-group-flush mb-3">
            <li class="list-group-item">$699.00</li>
            <li class="list-group-item">
              Temperatura recomendada: 18°C a 30°C
            </li>
          </ul>
          <div class="mt-auto">
            <a href="#" class="card-link">Comprar</a>
            <a href="agregarCarrito.js" class="card-link">Agregar al carrito</a>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
